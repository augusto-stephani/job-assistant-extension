<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard - Job Assistant Jr</title>
    <link rel="stylesheet" href="dashboard.css">
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div>
          <h1>Ofertas guardadas</h1>
          <p id="count">0 ofertas</p>
        </div>
        <div class="header-actions">
          <a href="options.html">Perfil</a>
        </div>
      </header>

      <section class="toolbar">
        <nav class="job-tabs" aria-label="Ofertas">
          <button class="job-tab active" data-tab="new">Nuevas</button>
          <button class="job-tab" data-tab="applied">Postuladas</button>
          <button class="job-tab" data-tab="low">Menos chances</button>
        </nav>
        <label>Orden <select id="sortBy">
          <option value="best">Mejores opciones</option>
          <option value="score">Score mayor primero</option>
          <option value="date">Mas recientes primero</option>
          <option value="title">Titulo A-Z</option>
        </select></label>
      </section>

      <section id="emptyState" class="empty hidden">
        <h2>No hay ofertas guardadas</h2>
        <p>Analiza una oferta desde el popup y guardala para verla aca.</p>
      </section>

      <section id="jobsBody" class="jobs-grid"></section>

      <section id="applyPanel" class="apply-panel hidden">
        <div class="apply-header">
          <div>
            <h2 id="applyTitle">Postular</h2>
            <p id="applyMeta">Revisa el mensaje antes de enviarlo.</p>
          </div>
          <button id="closeApplyBtn">Cerrar</button>
        </div>

        <label>Asunto <input id="applySubject" type="text"></label>
        <section class="apply-summary">
          <p id="cvSummary">CV: no cargado</p>
          <p>La carta se genera con tus tecnologias y se puede editar antes de preparar la oferta.</p>
        </section>

        <label>Carta editable para esta oferta <textarea id="applyMessage" rows="14"></textarea></label>

        <div class="apply-actions">
          <button id="prepareApplyBtn" class="primary">Postular</button>
          <button id="copyApplyBtn">Copiar mensaje</button>
          <button id="openApplyUrlBtn">Abrir oferta</button>
          <button id="markAppliedBtn">Marcar postulada</button>
        </div>
        <p id="applyStatus" class="apply-status"></p>
      </section>
    </main>

    <script type="module" src="dashboard.js"></script>
  </body>
</html>
