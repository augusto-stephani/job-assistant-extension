<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job Assistant Jr</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="topbar">
        <div>
          <h1>Job Assistant Jr</h1>
          <p id="pageStatus">Listo para analizar.</p>
        </div>
        <button id="openOptions" class="icon-button" title="Opciones">OP</button>
      </header>

      <nav class="tabs" aria-label="Secciones">
        <button class="tab active" data-tab="analyzePanel">Analizar</button>
        <button class="tab" data-tab="searchPanel">Buscar</button>
        <button class="tab" data-tab="cvPanel">CV</button>
      </nav>

      <section id="analyzePanel" class="panel active">
        <section class="actions">
          <button id="analyzeBtn" class="primary">Analizar pagina</button>
          <button id="dashboardBtn">Dashboard</button>
        </section>

        <label class="toggle-row">
          <span>
            <strong>Autocompletar formularios</strong>
            <small>Solo en portales laborales</small>
          </span>
          <input id="floatingAutofillToggle" type="checkbox">
        </label>

        <section id="result" class="result hidden">
          <div class="score-row">
            <div>
              <p class="label">Score</p>
              <strong id="scoreValue">0</strong>
            </div>
            <span id="recommendation" class="badge">Revisar</span>
          </div>

          <dl class="details">
            <div><dt>Titulo</dt><dd id="jobTitle">No detectado</dd></div>
            <div><dt>Empresa</dt><dd id="company">No detectado</dd></div>
            <div><dt>Pagina</dt><dd id="source">No detectado</dd></div>
            <div><dt>Sueldo</dt><dd id="salary">No detectado</dd></div>
            <div><dt>Modalidad</dt><dd id="modality">No detectado</dd></div>
            <div><dt>Seniority</dt><dd id="seniority">No detectado</dd></div>
            <div><dt>Experiencia</dt><dd id="experienceRequired">No detectado</dd></div>
            <div><dt>Tecnologias</dt><dd id="technologies">No detectado</dd></div>
          </dl>

          <div class="list-block">
            <h2>Puntos a favor</h2>
            <ul id="pros"></ul>
          </div>

          <div class="list-block">
            <h2>Puntos en contra</h2>
            <ul id="cons"></ul>
          </div>

          <label class="field">
            Estado
            <select id="statusSelect"></select>
          </label>

          <div class="actions stack">
            <button id="messageBtn">Generar mensaje</button>
            <button id="emailBtn">Generar email</button>
            <button id="applyAssistBtn">Preparar postulacion</button>
            <button id="saveBtn" class="primary">Guardar oferta</button>
          </div>

          <textarea id="outputText" rows="8" readonly placeholder="El mensaje generado aparecera aca."></textarea>
          <button id="copyBtn" class="hidden">Copiar texto</button>
        </section>
      </section>

      <section id="searchPanel" class="panel">
        <div class="search-box">
          <label>Busqueda <input id="searchQuery" type="text" placeholder="Sugerido: Python, Flask, Backend Jr, Trainee, remoto"></label>
          <label>Ubicacion <input id="searchLocation" type="text" placeholder="Argentina, remoto o LATAM"></label>
          <label>Pagina
            <select id="searchSite">
              <option value="linkedin">LinkedIn</option>
              <option value="indeed">Indeed</option>
              <option value="computrabajo">Computrabajo</option>
              <option value="zonajobs">Zonajobs</option>
              <option value="google">Google</option>
            </select>
          </label>
          <div class="actions stack">
            <button id="openSearchesBtn">Abrir una busqueda</button>
            <button id="analyzeLinksBtn" class="primary">Analizar pagina y abrir dashboard</button>
          </div>
        </div>
        <div id="searchResults" class="search-results"></div>
      </section>

      <section id="cvPanel" class="panel">
        <div class="search-box">
          <label>Cargar CV <input id="cvFile" type="file" accept=".pdf,.doc,.docx,.txt"></label>
          <p id="cvInfo" class="hint">No hay CV cargado.</p>
          <label>Texto del CV <textarea id="cvText" rows="7" placeholder="Pega aca una version en texto para copiar rapido."></textarea></label>
          <div class="actions stack">
            <button id="saveCvBtn" class="primary">Guardar CV</button>
            <button id="copyCvBtn">Copiar texto del CV</button>
            <button id="downloadCvBtn">Descargar CV cargado</button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
